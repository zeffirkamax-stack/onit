version: "3.9"

services:
  app1:
    build: .
    container_name: lab4-app1
    environment:
      - NODE_NAME=Нода 1
      - PORT=3000

  app2:
    build: .
    container_name: lab4-app2
    environment:
      - NODE_NAME=Нода 2
      - PORT=3000

  app3:
    build: .
    container_name: lab4-app3
    environment:
      - NODE_NAME=Нода 3
      - PORT=3000

  nginx:
    image: nginx:1.27-alpine
    container_name: lab4-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

